name: multinode test

on:
  workflow_dispatch:

jobs:
  multi-cpu:
    runs-on: gha-runner-actions-test
    container:
      image: docker.io/bitnami/kubectl:latest
    steps:
      - name: Submit mpijob
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: kubeflow.org/v2beta1
          kind: MPIJob
          metadata:
            name: arc-mpijob
          spec:
            slotsPerWorker: 1
            runPolicy:
              cleanPodPolicy: Running
            sshAuthMountPath: /root/.ssh
            mpiReplicaSpecs:
              Launcher:
                replicas: 1
                template:
                  spec:
                    containers:
                    - image: docker.io/kubeflow/mpi-horovod-mnist
                      name: mpi-launcher
                      command:
                      - mpirun
                      args:
                      - -np
                      - "2"
                      - --allow-run-as-root
                      - -bind-to
                      - none
                      - -map-by
                      - slot
                      - -x
                      - LD_LIBRARY_PATH
                      - -x
                      - PATH
                      - -mca
                      - pml
                      - ob1
                      - -mca
                      - btl
                      - ^openib
                      - python
                      - /examples/tensorflow_mnist.py
                      securityContext:
                        privileged: true
                      resources:
                        limits:
                          cpu: 1
                          memory: 2Gi
              Worker:
                replicas: 2
                template:
                  spec:
                    containers:
                    - image: docker.io/kubeflow/mpi-horovod-mnist
                      command:
                        - /usr/sbin/sshd
                        - -De
                        - -f
                        - /root/.sshd_config
                      name: mpi-worker
                      securityContext:
                        privileged: true
                      resources:
                        limits:
                          cpu: 10
                          memory: 16Gi
                      volumeMounts:
                      - name: sshd
                        mountPath: /root/.sshd_config
                        subPath: .sshd_config
                        readOnly: true
                    volumes:
                    - name: sshd
                      configMap:
                        name: sshd
                        items:
                          - key: sshd
                            path: .sshd_config
          EOF

      - name: Wait for mpijob to complete
        run: |
          while true; do
            status=$(kubectl get mpijob arc-mpijob -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}')
            if [[ "$status" == "True" ]]; then
              echo "MPIJob succeeded!"
              break
            fi
            if [[ "$status" == "False" ]]; then
              echo "MPIJob failed!"
              exit 1
            fi
            echo "Waiting for MPIJob to complete..."
            sleep 10
          done
      - name: Get logs from mpijob
        run: |
          kubectl logs -l mpi-job-name=arc-mpijob -c mpi-launcher
      - name: Clean up mpijob
        run: |
          kubectl delete mpijob arc-mpijob
            
